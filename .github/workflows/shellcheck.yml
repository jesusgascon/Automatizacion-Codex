name: shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Ejecutar ShellCheck
        run: shellcheck resumir-sesion-codex.sh instalar.sh
